name: Build LeetCode Tracker APK

on:
  push:
    branches: [ "master", "main", "develop" ]
  pull_request:
    branches: [ "master", "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v3

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: 8.11.1

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Accept Android SDK licenses
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Build debug APK
      run: ./gradlew assembleDebug --stacktrace --info

    - name: Build release APK (unsigned)
      run: ./gradlew assembleRelease --stacktrace --info
      continue-on-error: true

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: leetcode-tracker-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: leetcode-tracker-release-unsigned
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: Build test report
      if: always()
      run: ./gradlew testDebug --stacktrace || true

    - name: Lint analysis
      if: always()
      run: ./gradlew lint --stacktrace || true

    - name: Upload build logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          **/build/reports/
          **/build/logs/
        retention-days: 7

    - name: Success notification
      if: success()
      run: |
        echo "✅ Build successful!"
        echo "Debug APK: app/build/outputs/apk/debug/app-debug.apk"
        echo "Release APK (unsigned): app/build/outputs/apk/release/app-release-unsigned.apk"

    - name: Failure notification
      if: failure()
      run: |
        echo "❌ Build failed! Check logs above."
        exit 1
